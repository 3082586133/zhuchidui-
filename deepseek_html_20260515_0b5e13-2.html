<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>西华师范大学 · 生命科学学院主持队</title>
    <style>
        :root {
            --primary: #2c6e49;
            --primary-light: #4c956c;
            --primary-dark: #1b4332;
            --accent: #f0a500;
            --bg: #f8f9f6;
            --card-bg: #ffffff;
            --text: #2d3436;
            --text-light: #636e72;
            --border: #e0e5df;
            --shadow: 0 2px 12px rgba(0,0,0,0.07);
            --shadow-hover: 0 6px 24px rgba(0,0,0,0.12);
            --radius: 14px;
            --radius-sm: 8px;
            --transition: 0.25s;
            --font: 'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif;
        }
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:var(--font);background:var(--bg);color:var(--text);line-height:1.6;min-height:100vh;display:flex;flex-direction:column}
        .navbar{background:var(--card-bg);border-bottom:1px solid var(--border);padding:0 24px;height:62px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;box-shadow:0 1px 8px rgba(0,0,0,0.04);gap:16px;flex-wrap:wrap}
        .brand{display:flex;align-items:center;gap:10px;font-weight:700;font-size:1.08rem;color:var(--primary-dark);cursor:pointer}
        .logo-icon{width:38px;height:38px;background:var(--primary);border-radius:50%;display:flex;align-items:center;justify-content:center;color:#fff;font-size:1.2rem;flex-shrink:0}
        .nav-links{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
        .nav-links button{padding:8px 18px;border-radius:20px;border:1.5px solid var(--border);background:#fff;cursor:pointer;font-size:0.9rem;font-weight:500;color:var(--text);transition:var(--transition);white-space:nowrap}
        .nav-links button:hover{background:#f0f4f1;border-color:var(--primary-light)}
        .nav-links button.active{background:var(--primary);color:#fff;border-color:var(--primary);font-weight:600}
        .user-badge{display:flex;align-items:center;gap:8px;padding:6px 14px;border-radius:20px;background:#f0f4f1;font-size:0.88rem;font-weight:500;white-space:nowrap}
        .role-tag{font-size:0.7rem;padding:3px 10px;border-radius:12px;font-weight:600}
        .role-admin{background:#ffe0e0;color:#c0392b}.role-captain{background:#fff3d6;color:#b8730a}.role-member{background:#dff0e8;color:#1b6d3f}.role-guest{background:#eee;color:#666}
        .btn-logout{background:none;border:none;cursor:pointer;color:#c0392b;font-weight:600;font-size:0.82rem;padding:4px 8px;border-radius:4px}
        .btn-login-nav{padding:8px 18px;border-radius:20px;background:var(--primary);color:#fff;border:none;cursor:pointer;font-weight:600;font-size:0.9rem}
        .main-container{flex:1;padding:28px 24px 40px;max-width:1300px;margin:0 auto;width:100%}
        .page-title{font-size:1.6rem;font-weight:700;color:var(--primary-dark);margin-bottom:6px}
        .page-subtitle{font-size:0.92rem;color:var(--text-light);margin-bottom:12px}
        .welcome-text{font-size:1.1rem;color:var(--primary);font-weight:600;margin-bottom:20px;text-align:center}
        .intro-section{background:var(--card-bg);border-radius:var(--radius);box-shadow:var(--shadow);padding:20px;margin-bottom:28px;position:relative}
        .intro-content{font-size:0.95rem;line-height:1.7;color:var(--text);white-space:pre-wrap}
        .intro-edit-btn{position:absolute;top:10px;right:16px;background:var(--primary-light);color:#fff;border:none;padding:4px 14px;border-radius:14px;cursor:pointer;font-size:0.8rem;font-weight:600}
        .home-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:20px}
        @media(max-width:900px){.home-grid{grid-template-columns:1fr}}
        .home-column{background:#fff;border-radius:var(--radius);box-shadow:var(--shadow);padding:16px;display:flex;flex-direction:column}
        .home-column h3{font-size:1.1rem;color:var(--primary-dark);border-bottom:2px solid var(--primary-light);padding-bottom:8px;margin-bottom:12px;text-align:center}
        .member-card{display:flex;align-items:center;gap:12px;padding:10px 8px;border-radius:var(--radius-sm);transition:var(--transition);cursor:pointer;border:1px solid transparent;background:#fafdfb;margin-bottom:8px}
        .member-card:hover{background:#f0f4f1;border-color:var(--primary-light);box-shadow:var(--shadow-hover)}
        .card-photo{width:50px;height:50px;border-radius:50%;object-fit:cover;border:2px solid var(--primary-light);flex-shrink:0;background:#e8ece9}
        .card-info{flex:1;min-width:0}
        .card-info .name{font-weight:700;color:var(--primary-dark);font-size:0.95rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
        .card-info .team-name{font-size:0.8rem;color:var(--primary);font-weight:500}
        .card-info .grade{font-size:0.75rem;color:var(--text-light);margin-top:2px}
        .card-info .achievement{font-size:0.75rem;color:#555;margin-top:2px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
        .empty-hint{text-align:center;color:var(--text-light);font-size:0.85rem;padding:20px 0}
        .accordion{display:flex;flex-direction:column;gap:8px}
        .accordion-item{border:1.5px solid var(--border);border-radius:var(--radius-sm);background:#fff;overflow:hidden}
        .accordion-header{padding:14px 18px;background:#f9fbfa;cursor:pointer;display:flex;justify-content:space-between;align-items:center;font-weight:600;color:var(--primary-dark)}
        .accordion-body{max-height:0;overflow:hidden;transition:max-height 0.4s ease}
        .accordion-body.open{max-height:2000px}
        .inner-table-wrap{padding:0 10px 10px;overflow-x:auto}
        .members-table{width:100%;border-collapse:collapse;min-width:700px}
        .members-table th,.members-table td{padding:10px 12px;text-align:left;border-bottom:1px solid var(--border);font-size:0.88rem}
        .members-table th{background:#f5f8f6;font-weight:700;color:var(--primary-dark);font-size:0.78rem}
        .member-avatar-sm{width:38px;height:38px;border-radius:50%;object-fit:cover;background:#e8ece9}
        .btn-table{padding:5px 12px;border-radius:12px;border:1.5px solid var(--primary-light);background:#fff;cursor:pointer;font-size:0.78rem;font-weight:500}
        .btn-table:disabled{opacity:0.4;cursor:not-allowed}
        .filter-bar{display:flex;flex-wrap:wrap;gap:12px;align-items:center;padding:14px 16px;background:var(--card-bg);border-radius:var(--radius);box-shadow:var(--shadow);margin-bottom:20px}
        .filter-bar select,.filter-bar input{padding:10px 14px;border-radius:var(--radius-sm);border:1.5px solid var(--border);font-size:0.9rem;background:#fafbf9;min-width:120px}
        .filter-bar input{flex:1;min-width:180px}
        .btn-filter{padding:10px 20px;border-radius:var(--radius-sm);border:none;cursor:pointer;font-weight:600;font-size:0.88rem;white-space:nowrap}
        .btn-reset{background:#fff;border:1.5px solid var(--border);color:var(--text)}
        .btn-export{background:var(--accent);color:#fff}
        .btn-export:disabled{background:#ccc;cursor:not-allowed}
        .modal-overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.45);z-index:200;display:flex;align-items:center;justify-content:center;animation:fadeIn 0.2s ease}
        @keyframes fadeIn{from{opacity:0}to{opacity:1}}
        .modal{background:#fff;border-radius:var(--radius);padding:28px 26px;width:92%;max-width:560px;max-height:85vh;overflow-y:auto;box-shadow:0 12px 40px rgba(0,0,0,0.2);animation:slideUp 0.3s ease}
        @keyframes slideUp{from{transform:translateY(30px);opacity:0}to{transform:translateY(0);opacity:1}}
        .modal h3{margin-bottom:18px;font-size:1.2rem;color:var(--primary-dark)}
        .form-group{margin-bottom:14px}
        .form-group label{display:block;font-weight:600;font-size:0.85rem;margin-bottom:5px}
        .form-group input,.form-group select,.form-group textarea{width:100%;padding:10px 14px;border-radius:var(--radius-sm);border:1.5px solid var(--border);font-size:0.9rem;background:#fafbf9}
        .form-group textarea{resize:vertical;min-height:70px}
        .btn-row{display:flex;gap:10px;justify-content:flex-end;margin-top:20px;flex-wrap:wrap}
        .btn-row button{padding:10px 22px;border-radius:20px;border:none;cursor:pointer;font-weight:600;font-size:0.9rem}
        .btn-save{background:var(--primary);color:#fff}
        .btn-cancel{background:#eee;color:#555}
        .btn-delete{background:#e74c3c;color:#fff}
        .login-form{display:flex;flex-direction:column;gap:14px}
        .login-form input{padding:12px 16px;border-radius:var(--radius-sm);border:1.5px solid var(--border);font-size:0.9rem;background:#fafbf9;width:100%}
        .login-hint{font-size:0.78rem;color:#888;margin-top:4px}
        .toast{position:fixed;top:20px;right:20px;padding:12px 22px;border-radius:20px;color:#fff;font-weight:600;font-size:0.88rem;z-index:300;animation:slideInRight 0.35s ease;box-shadow:0 4px 16px rgba(0,0,0,0.18)}
        @keyframes slideInRight{from{transform:translateX(120%);opacity:0}to{transform:translateX(0);opacity:1}}
        .toast-success{background:#27ae60}.toast-error{background:#e74c3c}.toast-info{background:#2980b9}
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="brand" onclick="navigateTo('home')"><div class="logo-icon">🎤</div><span>生科院主持队</span></div>
        <div class="nav-links">
            <button onclick="navigateTo('home')" id="navHome" class="active">🏠 首页</button>
            <button onclick="navigateTo('members')" id="navMembers">👥 成员列表</button>
            <button id="btnPermMgmt" style="display:none;" onclick="openPermissionMgmt()">⚙️ 权限管理</button>
            <span id="userBadgeArea"><span class="user-badge"><span class="role-tag role-guest">访客</span> 未登录</span></span>
            <button class="btn-login-nav" id="btnLoginNav" onclick="openLoginModal()">🔑 登录</button>
        </div>
    </nav>

    <div class="main-container" id="mainContainer"></div>

    <div class="modal-overlay" id="loginModal" style="display:none;">
        <div class="modal">
            <h3>🔐 登录系统</h3>
            <div class="login-form">
                <input type="text" id="loginUsername" placeholder="账号">
                <input type="password" id="loginPassword" placeholder="密码">
                <div class="login-hint">成员账号请查看导出的Excel表格</div>
                <div class="btn-row"><button class="btn-cancel" onclick="closeLoginModal()">取消</button><button class="btn-save" onclick="handleLogin()">登录</button></div>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="editModal" style="display:none;">
        <div class="modal" id="editModalContent"></div>
    </div>

    <div class="modal-overlay" id="detailModal" style="display:none;">
        <div class="modal" id="detailModalContent"></div>
    </div>

    <div class="modal-overlay" id="introModal" style="display:none;">
        <div class="modal" id="introModalContent"></div>
    </div>

    <div class="modal-overlay" id="permModal" style="display:none;">
        <div class="modal" id="permModalContent"></div>
    </div>

    <div id="toastContainer"></div>

    <script>
        (function() {
            const STORAGE_KEY = 'xhsd_v9';
            const PERM_STORAGE_KEY = 'xhsd_captain_perms';
            let members = [];
            let teamAwards = {};
            let captainPermissions = {};
            let currentUser = null;
            let currentPage = 'home';
            let filterPosition = null;
            let filterKeyword = '';

            function generateId() { return 'm_'+Date.now()+Math.random().toString(36).substr(2,6); }
            function getGradeLabel(g){ return g+'级'; }
            function escapeHTML(s){ if(!s) return ''; const d=document.createElement('div'); d.textContent=s; return d.innerHTML; }
            function generateAvatar(name,size){
                const i=(name||'?')[0]; const colors=['#2c6e49','#4c956c','#1b4332','#f0a500','#c0841a'];
                const c=colors[Math.abs(hash(name))%colors.length];
                return `data:image/svg+xml,${encodeURIComponent(`<svg xmlns="http://www.w3.org/2000/svg" width="${size}" height="${size}"><rect width="${size}" height="${size}" fill="${c}" rx="${size/4}"/><text x="50%" y="54%" dominant-baseline="middle" text-anchor="middle" fill="white" font-size="${size*0.45}" font-weight="bold" font-family="sans-serif">${i}</text></svg>`)}`;
            }
            function hash(s){ let h=0; for(let i=0;i<s.length;i++){ h=((h<<5)-h)+s.charCodeAt(i); h|=0; } return Math.abs(h); }
            function randomPassword(len=6){ const chars='abcdefghijklmnopqrstuvwxyz0123456789'; let p=''; for(let i=0;i<len;i++) p+=chars[Math.floor(Math.random()*chars.length)]; return p; }
            function getPosAbbr(pos){ if(pos==='队长') return 'dz'; if(pos==='副部长') return 'fb'; if(pos==='干事') return 'gs'; if(pos==='编外成员') return 'bw'; return 'ot'; }
            function generateAccount(grade, pos){
                const abbr = getPosAbbr(pos);
                const same = members.filter(m=>m.grade===grade && m.position===pos);
                let maxNum = 0;
                same.forEach(m=>{ const match = m.account?.match(new RegExp(`zcd${grade}${abbr}(\\d+)`)); if(match) maxNum = Math.max(maxNum, parseInt(match[1])); });
                const num = (maxNum+1).toString().padStart(2,'0');
                return `zcd${grade}${abbr}${num}`;
            }

            function saveData(){ localStorage.setItem(STORAGE_KEY, JSON.stringify({members, teamAwards})); }
            function loadData(){
                try{
                    const raw = localStorage.getItem(STORAGE_KEY);
                    if(raw){ const data=JSON.parse(raw); members=data.members||[]; teamAwards=data.teamAwards||{}; }
                    else initFreshData();
                } catch(e){ initFreshData(); }
                if(!members.length) initFreshData();
                const grades = [...new Set(members.map(m=>m.grade))];
                grades.forEach(g=>{ if(!(g in teamAwards)) teamAwards[g]=''; });
                if(!teamAwards['_intro']) teamAwards['_intro'] = '欢迎来到西华师范大学生命科学学院主持队！我们是一个充满活力的团队，致力于学院各类活动的主持工作。';
                saveData();
            }
            function loadCaptainPermissions(){
                try{
                    const raw = localStorage.getItem(PERM_STORAGE_KEY);
                    if(raw) captainPermissions = JSON.parse(raw);
                    else captainPermissions = {};
                } catch(e){ captainPermissions = {}; }
            }
            function saveCaptainPermissions(){
                localStorage.setItem(PERM_STORAGE_KEY, JSON.stringify(captainPermissions));
            }
            function getCaptainPerms(grade){
                return captainPermissions[grade] || { canEditPhoto: false, canEditDuty: false };
            }
            function loadCurrentUser(){
                try{ const u=localStorage.getItem('xhsd_curr'); if(u) currentUser=JSON.parse(u); } catch(e){ currentUser=null; }
            }
            function saveCurrentUser(){
                if(currentUser) localStorage.setItem('xhsd_curr', JSON.stringify(currentUser));
                else localStorage.removeItem('xhsd_curr');
            }

            function initFreshData(){
                members=[]; teamAwards={};
                const grades = [2023,2024,2025];
                const awardsOptions = ['主持人大赛金奖','校级十佳主持团队','优秀学生组织','年度最佳协作奖'];
                grades.forEach((g, idx)=>{
                    teamAwards[g] = awardsOptions[idx%4];
                    for(let i=0;i<2;i++){
                        const acc=generateAccount(g,'队长');
                        members.push({ id:generateId(), grade:g, position:'队长', photo:'', name:`用户${i+1}`, teamName:`阿${i+1}`, achievement:'', duty:'', contact:'', account:acc, password:randomPassword(), showOnHome:false });
                    }
                    for(let i=0;i<4;i++){
                        const acc=generateAccount(g,'副部长');
                        members.push({ id:generateId(), grade:g, position:'副部长', photo:'', name:`用户${i+3}`, teamName:`阿${i+3}`, achievement:'', duty:'', contact:'', account:acc, password:randomPassword(), showOnHome:false });
                    }
                    for(let i=0;i<10;i++){
                        const acc=generateAccount(g,'干事');
                        members.push({ id:generateId(), grade:g, position:'干事', photo:'', name:`用户${i+7}`, teamName:`阿${i+7}`, achievement:'', duty:'', contact:'', account:acc, password:randomPassword(), showOnHome:false });
                    }
                });
                saveData();
            }

            function canEditMember(m){
                if(!currentUser) return false;
                if(currentUser.role==='admin') return true;
                if(currentUser.role==='captain') return m.grade === currentUser.grade;
                if(currentUser.role==='member') return m.id === currentUser.memberId;
                return false;
            }
            function canExport(){ return currentUser && (currentUser.role==='admin'||currentUser.role==='captain'); }

            function showToast(msg,type='info'){
                const c=document.getElementById('toastContainer');
                const t=document.createElement('div'); t.className='toast toast-'+type; t.textContent=msg; c.appendChild(t);
                setTimeout(()=>{ t.style.opacity='0'; t.style.transition='opacity 0.4s'; setTimeout(()=>t.remove(),400); },2500);
            }

            function navigateTo(page){
                currentPage=page; if(page==='home'){ filterPosition=null; filterKeyword=''; }
                updateNavActive(); renderPage(); window.scrollTo({top:0,behavior:'smooth'});
            }
            function updateNavActive(){
                document.getElementById('navHome').classList.toggle('active', currentPage==='home');
                document.getElementById('navMembers').classList.toggle('active', currentPage==='members');
            }
            function updateUserBadge(){
                const badge=document.getElementById('userBadgeArea'), btnLogin=document.getElementById('btnLoginNav');
                const btnPerm = document.getElementById('btnPermMgmt');
                if(currentUser){
                    let cls='role-member', label='个人';
                    if(currentUser.role==='admin'){ cls='role-admin'; label='管理者'; }
                    else if(currentUser.role==='captain'){ cls='role-captain'; label=currentUser.grade+'级队长'; }
                    badge.innerHTML=`<span class="user-badge"><span class="role-tag ${cls}">${label}</span> ${escapeHTML(currentUser.name)} <button class="btn-logout" onclick="logout()">退出</button></span>`;
                    btnLogin.style.display='none';
                    btnPerm.style.display = currentUser.role==='admin' ? 'inline-block' : 'none';
                } else {
                    badge.innerHTML='<span class="user-badge"><span class="role-tag role-guest">访客</span> 未登录</span>';
                    btnLogin.style.display='inline-block';
                    btnPerm.style.display='none';
                }
            }

            function renderPage(){
                const c=document.getElementById('mainContainer');
                updateUserBadge();
                if(currentPage==='home') renderHome(c); else renderMembers(c);
            }

            function renderHome(container){
                const introText = teamAwards['_intro'] || '';
                const showMembers = members.filter(m => m.showOnHome === true);
                const captains = showMembers.filter(m=>m.position==='队长').sort((a,b)=>b.grade-a.grade);
                const viceCaptains = showMembers.filter(m=>m.position==='副部长').sort((a,b)=>b.grade-a.grade);
                const secretaries = showMembers.filter(m=>m.position==='干事').sort((a,b)=>b.grade-a.grade);

                function renderCard(m) {
                    const achievement = m.achievement ? `<div class="achievement">🏅 ${escapeHTML(m.achievement)}</div>` : '';
                    return `
                    <div class="member-card" onclick="openMemberDetail('${m.id}')">
                        <img class="card-photo" src="${m.photo||generateAvatar(m.name,50)}" onerror="this.src='${generateAvatar(m.name,50)}'">
                        <div class="card-info">
                            <div class="name">${escapeHTML(m.name)}</div>
                            <div class="team-name">${escapeHTML(m.teamName||'')}</div>
                            <div class="grade">${getGradeLabel(m.grade)}</div>
                            ${achievement}
                        </div>
                    </div>`;
                }

                let html = `
                <div class="intro-section">
                    <div class="intro-content">${escapeHTML(introText)}</div>
                    ${currentUser?.role==='admin' ? `<button class="intro-edit-btn" onclick="openIntroEdit()">✏️ 编辑介绍</button>` : ''}
                </div>
                <h1 class="page-title">🎤 团队风采</h1>
                <div class="welcome-text">阿氏家族欢迎你！🤗</div>
                <p class="page-subtitle">以下成员已选择在首页展示（可通过编辑资料勾选）</p>
                <div class="home-grid">
                    <div class="home-column">
                        <h3>🎖️ 历届队长</h3>
                        ${captains.length ? captains.map(renderCard).join('') : '<div class="empty-hint">暂无队长展示</div>'}
                    </div>
                    <div class="home-column">
                        <h3>⭐ 历届副部长</h3>
                        ${viceCaptains.length ? viceCaptains.map(renderCard).join('') : '<div class="empty-hint">暂无副部长展示</div>'}
                    </div>
                    <div class="home-column">
                        <h3>🌟 历届干事</h3>
                        ${secretaries.length ? secretaries.map(renderCard).join('') : '<div class="empty-hint">暂无干事展示</div>'}
                    </div>
                </div>`;
                container.innerHTML = html;
            }

            function openIntroEdit(){
                const content = document.getElementById('introModalContent');
                content.innerHTML = `
                <h3>✏️ 编辑主持队工作介绍</h3>
                <div class="form-group"><textarea id="introTextarea" rows="6">${escapeHTML(teamAwards['_intro']||'')}</textarea></div>
                <div class="btn-row">
                    <button class="btn-cancel" onclick="closeIntroModal()">取消</button>
                    <button class="btn-save" onclick="saveIntro()">保存</button>
                </div>`;
                document.getElementById('introModal').style.display='flex';
            }
            function closeIntroModal(){ document.getElementById('introModal').style.display='none'; }
            function saveIntro(){
                const text = document.getElementById('introTextarea')?.value || '';
                teamAwards['_intro'] = text;
                saveData();
                closeIntroModal();
                renderPage();
                showToast('介绍已更新','success');
            }

            function openMemberDetail(memberId){
                const m=members.find(x=>x.id===memberId); if(!m) return;
                const content=document.getElementById('detailModalContent');
                content.innerHTML=`
                <h3>👤 成员信息</h3>
                <div style="text-align:center"><img src="${m.photo||generateAvatar(m.name,100)}" style="width:90px;height:90px;border-radius:50%;object-fit:cover;border:3px solid var(--primary-light)" onerror="this.src='${generateAvatar(m.name,100)}'"></div>
                <p><strong>姓名：</strong>${escapeHTML(m.name)}</p>
                <p><strong>队内名：</strong>${escapeHTML(m.teamName||'—')}</p>
                <p><strong>年级：</strong>${getGradeLabel(m.grade)}</p>
                <p><strong>职位：</strong>${m.position}</p>
                <p><strong>个人成就：</strong>${escapeHTML(m.achievement||'暂无')}</p>
                ${m.position==='队长' ? `<p><strong>主持队职能：</strong>${escapeHTML(m.duty||'暂无')}</p>` : ''}
                <div class="btn-row"><button class="btn-cancel" onclick="closeDetailModal()">关闭</button></div>`;
                document.getElementById('detailModal').style.display='flex';
            }
            function closeDetailModal(){ document.getElementById('detailModal').style.display='none'; }

            function renderMembers(container, autoOpenGrade=null){
                let filtered=[...members].filter(m=>m.grade>=2023);
                if(filterPosition) filtered=filtered.filter(m=>m.position===filterPosition);
                if(filterKeyword){
                    const kw=filterKeyword.toLowerCase();
                    filtered=filtered.filter(m=>m.name.toLowerCase().includes(kw)||(m.teamName&&m.teamName.toLowerCase().includes(kw)));
                }
                const grades=[...new Set(filtered.map(m=>m.grade))].sort((a,b)=>a-b);
                let html=`
                <h1 class="page-title">👥 成员列表</h1>
                <p class="page-subtitle">按年级从2023级开始升序排列 · 点击“查看”了解详情</p>
                <div class="filter-bar">
                    <select id="filterPos" onchange="applyFilter()"><option value="">全部职位</option><option value="队长">队长</option><option value="副部长">副部长</option><option value="干事">干事</option><option value="编外成员">编外成员</option></select>
                    <input type="text" id="filterKw" placeholder="搜索姓名/队内名" value="${escapeHTML(filterKeyword)}" oninput="applyFilterDebounced()">
                    <button class="btn-filter btn-reset" onclick="resetFilter()">清空</button>
                    <button class="btn-filter btn-export" onclick="exportMembers()" ${canExport()?'':'disabled'}>📥 导出Excel</button>
                </div>`;
                if(!grades.length){ html+='<p class="no-data">无匹配成员</p>'; }
                else {
                    html+='<div class="accordion">';
                    grades.forEach(g=>{
                        const gm=filtered.filter(m=>m.grade===g);
                        html+=`<div class="accordion-item" data-grade="${g}">
                            <div class="accordion-header" onclick="toggleAccordion(this)"><span>📅 ${getGradeLabel(g)}</span><span style="background:var(--primary-light);color:#fff;padding:2px 10px;border-radius:12px;">${gm.length}人</span></div>
                            <div class="accordion-body"><div class="inner-table-wrap"><table class="members-table">
                                <thead><tr><th>照片</th><th>姓名</th><th>队内名</th><th>职位</th><th>操作</th></tr></thead>
                                <tbody>${gm.map(m=>`<tr>
                                    <td><img class="member-avatar-sm" src="${m.photo||generateAvatar(m.name,38)}" onerror="this.src='${generateAvatar(m.name,38)}'"></td>
                                    <td><strong>${escapeHTML(m.name)}</strong></td>
                                    <td>${escapeHTML(m.teamName||'—')}</td>
                                    <td>${m.position}</td>
                                    <td>
                                        <button class="btn-table" onclick="openMemberDetail('${m.id}')">👁️ 查看</button>
                                        <button class="btn-table" onclick="openEditMemberModal('${m.id}')" ${canEditMember(m)?'':'disabled'}>✏️ ${canEditMember(m)?'编辑':'无权限'}</button>
                                    </td></tr>`).join('')}</tbody>
                            </table></div></div></div>`;
                    });
                    html+='</div>';
                    if(currentUser&&(currentUser.role==='admin'||currentUser.role==='captain')){
                        html+=`<div style="margin-top:16px;text-align:right"><button class="btn-filter btn-export" style="background:#2c6e49" onclick="openAddMemberModal()">➕ 添加成员</button></div>`;
                    }
                }
                container.innerHTML=html;
                if(autoOpenGrade) setTimeout(()=>{ const b=document.querySelector(`.accordion-item[data-grade="${autoOpenGrade}"] .accordion-body`); if(b) b.classList.add('open'); },100);
            }

            function toggleAccordion(header){ header.nextElementSibling.classList.toggle('open'); }
            function applyFilter(){
                filterPosition=document.getElementById('filterPos')?.value||null;
                filterKeyword=document.getElementById('filterKw')?.value||'';
                renderMembers(document.getElementById('mainContainer'));
            }
            let fDeb; function applyFilterDebounced(){ clearTimeout(fDeb); fDeb=setTimeout(applyFilter,300); }
            function resetFilter(){ filterPosition=null; filterKeyword=''; renderMembers(document.getElementById('mainContainer')); }

            function exportMembers(){
                if(!canExport()){ showToast('无导出权限','error'); return; }
                let data = getExportableMembers();
                if(filterPosition) data=data.filter(m=>m.position===filterPosition);
                if(filterKeyword){ const kw=filterKeyword.toLowerCase(); data=data.filter(m=>m.name.toLowerCase().includes(kw)||(m.teamName&&m.teamName.toLowerCase().includes(kw))); }
                if(!data.length){ showToast('无数据可导出','info'); return; }
                const BOM='\uFEFF';
                const headers=['姓名','队内名','年级','职位','账号','密码','个人成就','照片URL'];
                const rows=data.map(m=>[m.name,m.teamName||'',getGradeLabel(m.grade),m.position,m.account||'',m.password||'',m.achievement||'',m.photo||'']);
                const csv=BOM+[headers,...rows].map(r=>r.map(c=>'"'+(c||'').replace(/"/g,'""')+'"').join(',')).join('\n');
                const blob=new Blob([csv],{type:'text/csv;charset=utf-8;'});
                const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download=`主持队成员_${new Date().toISOString().slice(0,10)}.csv`;
                a.click(); showToast(`导出${data.length}条记录`,'success');
            }
            function getExportableMembers(){
                if(!currentUser) return [];
                if(currentUser.role==='admin') return [...members];
                if(currentUser.role==='captain') return members.filter(m=>m.grade === currentUser.grade);
                return [];
            }

            function openEditMemberModal(memberId){
                const m=members.find(x=>x.id===memberId); if(!m) return;
                if(!canEditMember(m)){ showToast('无编辑权限','error'); return; }
                const isAdmin = currentUser?.role === 'admin';
                const isCaptain = currentUser?.role === 'captain';
                const gradeDisabled = isCaptain ? 'disabled' : '';
                const content=document.getElementById('editModalContent');
                let photoSection = '';
                if(isAdmin){
                    photoSection = `<div class="form-group"><label>照片上传</label><input type="file" id="editPhotoFile" accept="image/*"><br><small>当前: ${m.photo?'已设置':'无'}</small></div>`;
                }
                let dutySection = '';
                if(m.position==='队长'){
                    if(isAdmin || (isCaptain && getCaptainPerms(m.grade).canEditDuty)){
                        dutySection = `<div class="form-group"><label>主持队职能</label><textarea id="editDuty">${escapeHTML(m.duty||'')}</textarea></div>`;
                    }
                }
                content.innerHTML=`
                <h3>✏️ 编辑成员</h3>
                ${photoSection}
                <div class="form-group"><label>姓名 *</label><input id="editName" value="${escapeHTML(m.name)}"></div>
                <div class="form-group"><label>队内名 *</label><input id="editTeamName" value="${escapeHTML(m.teamName||'')}"></div>
                <div class="form-group"><label>年级</label><select id="editGrade" ${gradeDisabled}>${gradeOptions(m.grade, isCaptain)}</select></div>
                <div class="form-group"><label>职位</label><select id="editPos">${posOptions(m.position)}</select></div>
                <div class="form-group"><label>个人成就</label><textarea id="editAchievement">${escapeHTML(m.achievement||'')}</textarea></div>
                ${dutySection}
                <div class="form-group"><label><input type="checkbox" id="editShowOnHome" ${m.showOnHome?'checked':''}> 在首页展示</label></div>
                <div class="btn-row">
                    ${currentUser?.role==='admin'?`<button class="btn-delete" onclick="deleteMember('${m.id}')">删除</button>`:''}
                    <button class="btn-cancel" onclick="closeEditModal()">取消</button>
                    <button class="btn-save" onclick="saveMemberEdit('${m.id}')">保存</button>
                </div>`;
                document.getElementById('editModal').style.display='flex';
            }

            function openAddMemberModal(){
                if(!currentUser||(currentUser.role!=='admin'&&currentUser.role!=='captain')){ showToast('无权限','error'); return; }
                const isAdmin = currentUser.role === 'admin';
                const isCaptain = currentUser.role === 'captain';
                const defaultGrade = isCaptain ? currentUser.grade : 2023;
                const gradeDisabled = isCaptain ? 'disabled' : '';
                const content=document.getElementById('editModalContent');
                content.innerHTML=`
                <h3>➕ 添加成员</h3>
                ${isAdmin ? '<div class="form-group"><label>照片上传</label><input type="file" id="editPhotoFile" accept="image/*"></div>' : ''}
                <div class="form-group"><label>姓名 *</label><input id="editName"></div>
                <div class="form-group"><label>队内名 *</label><input id="editTeamName"></div>
                <div class="form-group"><label>年级</label><select id="editGrade" ${gradeDisabled}>${gradeOptions(defaultGrade, isCaptain)}</select></div>
                <div class="form-group"><label>职位</label><select id="editPos" onchange="toggleDutyInput()">${posOptions('干事')}</select></div>
                <div class="form-group"><label>个人成就</label><textarea id="editAchievement"></textarea></div>
                <div id="dutyGroup" class="form-group" style="display:none;"><label>主持队职能</label><textarea id="editDuty"></textarea></div>
                <div class="form-group"><label><input type="checkbox" id="editShowOnHome"> 在首页展示</label></div>
                <div class="btn-row"><button class="btn-cancel" onclick="closeEditModal()">取消</button><button class="btn-save" onclick="saveNewMember()">添加</button></div>`;
                document.getElementById('editModal').style.display='flex';
            }

            function toggleDutyInput(){
                const pos = document.getElementById('editPos')?.value;
                const group = document.getElementById('dutyGroup');
                if(group) group.style.display = pos==='队长' ? 'block' : 'none';
            }

            function handlePhotoUpload(fileInputId, callback){
                const fileInput = document.getElementById(fileInputId);
                if(!fileInput || !fileInput.files || !fileInput.files[0]){ callback(null); return; }
                const reader = new FileReader();
                reader.onload = (e) => callback(e.target.result);
                reader.readAsDataURL(fileInput.files[0]);
            }

            function saveMemberEdit(memberId){
                const m=members.find(x=>x.id===memberId); if(!m) return;
                const name=document.getElementById('editName')?.value.trim();
                const team=document.getElementById('editTeamName')?.value.trim();
                if(!name||!team){ showToast('姓名和队内名必填','error'); return; }
                let newGrade = m.grade;
                if(currentUser?.role !== 'captain'){
                    newGrade = parseInt(document.getElementById('editGrade')?.value)||m.grade;
                }
                const newPos = document.getElementById('editPos')?.value||m.position;
                const achievement = document.getElementById('editAchievement')?.value||'';
                const showOnHome = document.getElementById('editShowOnHome')?.checked || false;
                const dutyEl = document.getElementById('editDuty');
                const newDuty = dutyEl ? (dutyEl.value||'') : m.duty;
                if(currentUser?.role === 'admin'){
                    handlePhotoUpload('editPhotoFile', (base64)=>{
                        if(base64) m.photo = base64;
                        m.name=name; m.teamName=team; m.grade=newGrade; m.position=newPos; m.achievement=achievement;
                        m.duty = newDuty; m.showOnHome = showOnHome;
                        if(newPos!==m.position || newGrade!==m.grade){
                            m.account = generateAccount(newGrade, newPos);
                            m.password = randomPassword();
                        }
                        saveData(); closeEditModal(); renderPage(); showToast('已更新','success');
                    });
                } else {
                    m.name=name; m.teamName=team; m.grade=newGrade; m.position=newPos; m.achievement=achievement;
                    m.duty = newDuty; m.showOnHome = showOnHome;
                    if(newPos!==m.position || newGrade!==m.grade){
                        m.account = generateAccount(newGrade, newPos);
                        m.password = randomPassword();
                    }
                    saveData(); closeEditModal(); renderPage(); showToast('已更新','success');
                }
            }

            function saveNewMember(){
                const name=document.getElementById('editName')?.value.trim();
                const team=document.getElementById('editTeamName')?.value.trim();
                if(!name||!team){ showToast('姓名和队内名必填','error'); return; }
                let grade = parseInt(document.getElementById('editGrade')?.value);
                if(currentUser?.role === 'captain'){ grade = currentUser.grade; }
                const pos=document.getElementById('editPos')?.value||'干事';
                const achievement = document.getElementById('editAchievement')?.value||'';
                const showOnHome = document.getElementById('editShowOnHome')?.checked || false;
                const dutyEl = document.getElementById('editDuty');
                const duty = dutyEl ? (dutyEl.value||'') : '';
                const isAdmin = currentUser?.role === 'admin';
                if(isAdmin){
                    handlePhotoUpload('editPhotoFile', (base64)=>{
                        const newMember = {
                            id: generateId(), grade, position:pos, photo: base64||'',
                            name, teamName:team, achievement, duty, contact:'',
                            account: generateAccount(grade, pos), password: randomPassword(),
                            showOnHome: showOnHome
                        };
                        members.push(newMember);
                        if(!(grade in teamAwards)) teamAwards[grade]='';
                        saveData(); closeEditModal(); renderPage(); showToast('成员已添加，账号已生成','success');
                    });
                } else {
                    const newMember = {
                        id: generateId(), grade, position:pos, photo: '',
                        name, teamName:team, achievement, duty, contact:'',
                        account: generateAccount(grade, pos), password: randomPassword(),
                        showOnHome: showOnHome
                    };
                    members.push(newMember);
                    if(!(grade in teamAwards)) teamAwards[grade]='';
                    saveData(); closeEditModal(); renderPage(); showToast('成员已添加','success');
                }
            }

            function deleteMember(memberId){
                if(!currentUser||currentUser.role!=='admin'){ showToast('仅管理者可删除','error'); return; }
                if(!confirm('确定删除？')) return;
                members=members.filter(m=>m.id!==memberId);
                saveData(); closeEditModal(); renderPage(); showToast('已删除','success');
            }
            function closeEditModal(){ document.getElementById('editModal').style.display='none'; }

            function openPermissionMgmt(){
                const content = document.getElementById('permModalContent');
                let html = '<h3>⚙️ 队长权限管理</h3><p>设置各年级队长可编辑照片和职能</p>';
                const grades = [...new Set(members.filter(m=>m.position==='队长').map(m=>m.grade))].sort((a,b)=>a-b);
                if(grades.length===0) html += '<p>暂无队长数据</p>';
                else {
                    grades.forEach(g=>{
                        const perm = getCaptainPerms(g);
                        html += `<div style="border:1px solid var(--border); border-radius:8px; padding:12px; margin-bottom:10px;">
                            <strong>${getGradeLabel(g)}</strong>
                            <div style="margin-top:6px;"><label><input type="checkbox" class="perm-photo-${g}" ${perm.canEditPhoto?'checked':''}> 允许编辑照片</label></div>
                            <div style="margin-top:4px;"><label><input type="checkbox" class="perm-duty-${g}" ${perm.canEditDuty?'checked':''}> 允许编辑职能</label></div>
                        </div>`;
                    });
                    html += `<div class="btn-row"><button class="btn-cancel" onclick="closePermModal()">取消</button><button class="btn-save" onclick="savePermissions()">保存</button></div>`;
                }
                content.innerHTML = html;
                document.getElementById('permModal').style.display='flex';
            }
            function closePermModal(){ document.getElementById('permModal').style.display='none'; }
            function savePermissions(){
                const grades = [...new Set(members.filter(m=>m.position==='队长').map(m=>m.grade))];
                grades.forEach(g=>{
                    const photoCheck = document.querySelector(`.perm-photo-${g}`);
                    const dutyCheck = document.querySelector(`.perm-duty-${g}`);
                    captainPermissions[g] = {
                        canEditPhoto: photoCheck?.checked || false,
                        canEditDuty: dutyCheck?.checked || false
                    };
                });
                saveCaptainPermissions();
                closePermModal();
                showToast('权限设置已保存','success');
            }

            function openLoginModal(){ document.getElementById('loginModal').style.display='flex'; }
            function closeLoginModal(){ document.getElementById('loginModal').style.display='none'; }
            function handleLogin(){
                const username = document.getElementById('loginUsername').value.trim();
                const password = document.getElementById('loginPassword').value;
                if(!username||!password){ showToast('请输入账号密码','error'); return; }
                if(username==='18148033797' && password==='092034'){
                    currentUser={role:'admin', grade:null, memberId:null, name:'管理者'};
                } else {
                    const member = members.find(m=>m.account===username && m.password===password);
                    if(!member){ showToast('账号或密码错误','error'); return; }
                    if(member.position==='队长'){
                        currentUser={role:'captain', grade:member.grade, memberId:member.id, name:member.name};
                    } else {
                        currentUser={role:'member', grade:member.grade, memberId:member.id, name:member.name};
                    }
                }
                saveCurrentUser(); closeLoginModal(); updateUserBadge(); renderPage();
                showToast(`欢迎，${currentUser.name}`,'success');
            }
            function logout(){
                currentUser=null; saveCurrentUser(); updateUserBadge(); renderPage(); showToast('已退出','info');
            }

            function gradeOptions(sel, isCaptain=false){
                if(isCaptain && currentUser){
                    return `<option value="${currentUser.grade}" selected>${getGradeLabel(currentUser.grade)}</option>`;
                }
                let o='';
                for(let g=2023; g<=2040; g++) o+=`<option value="${g}" ${g===sel?'selected':''}>${getGradeLabel(g)}</option>`;
                return o;
            }
            function posOptions(sel){
                return ['队长','副部长','干事','编外成员'].map(p=>`<option value="${p}" ${p===sel?'selected':''}>${p}</option>`).join('');
            }

            document.addEventListener('click', e=>{
                if(e.target.id==='editModal') closeEditModal();
                if(e.target.id==='loginModal') closeLoginModal();
                if(e.target.id==='detailModal') closeDetailModal();
                if(e.target.id==='introModal') closeIntroModal();
                if(e.target.id==='permModal') closePermModal();
            });
            document.addEventListener('keydown', e=>{
                if(e.key==='Escape'){
                    closeEditModal(); closeLoginModal(); closeDetailModal(); closeIntroModal(); closePermModal();
                }
            });

            function init(){
                loadData();
                loadCaptainPermissions();
                loadCurrentUser();
                updateUserBadge();
                updateNavActive();
                renderPage();
            }
            window.navigateTo=navigateTo;
            window.openIntroEdit=openIntroEdit; window.closeIntroModal=closeIntroModal; window.saveIntro=saveIntro;
            window.openMemberDetail=openMemberDetail; window.closeDetailModal=closeDetailModal;
            window.applyFilter=applyFilter; window.applyFilterDebounced=applyFilterDebounced;
            window.resetFilter=resetFilter; window.exportMembers=exportMembers;
            window.openEditMemberModal=openEditMemberModal; window.openAddMemberModal=openAddMemberModal;
            window.saveMemberEdit=saveMemberEdit; window.saveNewMember=saveNewMember; window.deleteMember=deleteMember;
            window.closeEditModal=closeEditModal; window.toggleDutyInput=toggleDutyInput;
            window.openLoginModal=openLoginModal; window.closeLoginModal=closeLoginModal;
            window.handleLogin=handleLogin; window.logout=logout; window.toggleAccordion=toggleAccordion;
            window.openPermissionMgmt=openPermissionMgmt; window.closePermModal=closePermModal; window.savePermissions=savePermissions;
            init();
        })();
    </script>
</body>
</html>
